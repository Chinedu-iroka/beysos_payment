<style>
/* ── CART ICON IN NAVBAR ── */
.nav-cart {
  position: relative; cursor: pointer;
  background: none; border: 1px solid var(--border);
  border-radius: 2px; padding: 8px 14px;
  color: var(--muted); font-size: 11px; letter-spacing: 0.15em;
  text-transform: uppercase; transition: all 0.3s;
  display: flex; align-items: center; gap: 8px;
}
.nav-cart:hover { color: var(--gold); border-color: rgba(201,168,76,0.4); }
.cart-badge {
  background: var(--gold); color: var(--ink);
  font-size: 9px; font-weight: 700;
  width: 18px; height: 18px; border-radius: 50%;
  display: none; align-items: center; justify-content: center;
  position: absolute; top: -7px; right: -7px;
}
.cart-badge.visible { display: flex; }

/* ── CART DRAWER ── */
.cart-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(13,13,13,0.6);
  backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.cart-overlay.open { opacity: 1; pointer-events: all; }
.cart-drawer {
  position: fixed; top: 0; right: 0; bottom: 0; z-index: 301;
  width: 420px; max-width: 100vw;
  background: #111;
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.cart-drawer.open { transform: translateX(0); }
.cart-drawer-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 28px 28px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.cart-drawer-header h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem; font-weight: 300; color: var(--cream);
}
.cart-drawer-header h3 span {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; color: var(--muted);
  font-weight: 300; margin-left: 8px;
}
.cart-close { background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; line-height: 1; transition: color 0.2s; }
.cart-close:hover { color: var(--cream); }
.cart-items { flex: 1; overflow-y: auto; padding: 20px 28px; display: flex; flex-direction: column; gap: 14px; }
.cart-items::-webkit-scrollbar { width: 4px; }
.cart-items::-webkit-scrollbar-track { background: transparent; }
.cart-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.cart-item {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 14px; background: rgba(255,255,255,0.03);
  border: 1px solid var(--border); border-radius: 2px;
  animation: slideIn 0.3s ease both;
}
@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
.cart-item-img { width: 64px; height: 64px; flex-shrink: 0; object-fit: cover; border-radius: 2px; border: 1px solid var(--border); }
.cart-item-info { flex: 1; min-width: 0; }
.cart-item-info .cat { font-size: 9px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
.cart-item-info .title { font-size: 13px; color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cart-item-remove { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1; transition: color 0.2s; flex-shrink: 0; padding: 0; }
.cart-item-remove:hover { color: #e87c6e; }
.cart-empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; line-height: 1.8; }
.cart-empty .icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
.cart-drawer-footer { padding: 20px 28px 28px; border-top: 1px solid var(--border); flex-shrink: 0; }
.cart-summary { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 16px; letter-spacing: 0.05em; }
.cart-summary span:last-child { color: var(--cream); }
.btn-proceed { width: 100%; padding: 15px; background: var(--gold); color: var(--ink); border: none; border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; font-weight: 500; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-proceed:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(201,168,76,0.25); }
.btn-proceed:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-clear-cart { width: 100%; margin-top: 10px; padding: 10px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
.btn-clear-cart:hover { color: #e87c6e; border-color: rgba(192,57,43,0.3); }
</style>
